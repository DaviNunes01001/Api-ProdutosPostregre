<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Teste da API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px 5px 5px 0;
        }
        button:hover {
            background: #764ba2;
        }
        .result {
            background: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Teste da API de Produtos</h1>

        <div class="test-section">
            <h3>1️⃣ Listar Todos os Produtos</h3>
            <button onclick="testarListar()">Listar Todos</button>
            <div id="resultListar" class="result"></div>
        </div>

        <div class="test-section">
            <h3>2️⃣ Buscar por ID</h3>
            <input type="number" id="inputId" placeholder="Digite o ID (ex: 1)" value="1" />
            <button onclick="testarPorId()">Buscar por ID</button>
            <div id="resultId" class="result"></div>
        </div>

        <div class="test-section">
            <h3>3️⃣ Buscar por Nome</h3>
            <input type="text" id="inputNome" placeholder="Digite o nome (ex: Notebook)" value="Notebook" />
            <button onclick="testarPorNome()">Buscar por Nome</button>
            <div id="resultNome" class="result"></div>
        </div>

        <div class="test-section">
            <h3>4️⃣ Buscar por Categoria</h3>
            <input type="text" id="inputCategoria" placeholder="Digite a categoria (ex: Eletrônicos)" value="Eletrônicos" />
            <button onclick="testarPorCategoria()">Buscar por Categoria</button>
            <div id="resultCategoria" class="result"></div>
        </div>
    </div>

    <script>
        async function testarListar() {
            const resultDiv = document.getElementById('resultListar');
            try {
                resultDiv.textContent = '⏳ Carregando...';
                const response = await fetch('/produtos');
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.classList.remove('error');
                resultDiv.classList.add('success');
            } catch (erro) {
                resultDiv.textContent = `❌ Erro: ${erro.message}`;
                resultDiv.classList.remove('success');
                resultDiv.classList.add('error');
            }
        }

        async function testarPorId() {
            const id = document.getElementById('inputId').value;
            const resultDiv = document.getElementById('resultId');
            try {
                resultDiv.textContent = '⏳ Carregando...';
                const response = await fetch(`/produtos/${id}`);
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.classList.remove('error');
                resultDiv.classList.add('success');
            } catch (erro) {
                resultDiv.textContent = `❌ Erro: ${erro.message}`;
                resultDiv.classList.remove('success');
                resultDiv.classList.add('error');
            }
        }

        async function testarPorNome() {
            const nome = document.getElementById('inputNome').value;
            const resultDiv = document.getElementById('resultNome');
            try {
                resultDiv.textContent = '⏳ Carregando...';
                const response = await fetch(`/produtos/nome/${encodeURIComponent(nome)}`);
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.classList.remove('error');
                resultDiv.classList.add('success');
            } catch (erro) {
                resultDiv.textContent = `❌ Erro: ${erro.message}`;
                resultDiv.classList.remove('success');
                resultDiv.classList.add('error');
            }
        }

        async function testarPorCategoria() {
            const categoria = document.getElementById('inputCategoria').value;
            const resultDiv = document.getElementById('resultCategoria');
            try {
                resultDiv.textContent = '⏳ Carregando...';
                console.log(`Testando: /produtos/categoria/${encodeURIComponent(categoria)}`);
                const response = await fetch(`/produtos/categoria/${encodeURIComponent(categoria)}`);
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.classList.remove('error');
                resultDiv.classList.add('success');
            } catch (erro) {
                resultDiv.textContent = `❌ Erro: ${erro.message}`;
                resultDiv.classList.remove('success');
                resultDiv.classList.add('error');
            }
        }

        // Testar tudo ao carregar
        window.addEventListener('load', () => {
            console.log('✅ Página de teste carregada');
            testarListar();
        });
    </script>
</body>
</html>
